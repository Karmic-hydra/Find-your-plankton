training:
  seed: 42

features:
  image_size: 64

data:
  # Set to null to use full split. Keep capped first for quick baseline runs.
  max_train_samples_per_class: 300
  max_val_samples_per_class: 100
  max_test_samples_per_class: 100

models:
  svm:
    kernel: rbf
    C: 10.0
    gamma: scale
    class_weight: balanced
    probability: false
  random_forest:
    n_estimators: 300
    max_depth: null
    n_jobs: -1
    class_weight: balanced_subsample
